<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台災 TWDMTDA | 台灣災難醫療隊發展協會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --primary: #1B365D; --accent: #FF7F32; }
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; scroll-behavior: smooth; }
        .text-primary { color: var(--primary); }
        .bg-primary { background-color: var(--primary); }
        .card-hover:hover { transform: translateY(-8px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        /* 預設隱藏 Modal，確保不會一載入就出現遮罩 */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-white">

    <!-- 預留 Navbar 載入位置 -->
    <div id="navbar-placeholder"></div>

    <header class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 bg-slate-50 overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 relative z-10">
            <div class="lg:w-2/3">
                <span class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-sm font-bold mb-6 inline-block">援手計畫 3.0 持續推進</span>
                <h1 class="text-5xl lg:text-7xl font-black text-primary mb-6 leading-tight">建立台灣民間的<br><span class="text-orange-500">災難應變韌性</span></h1>
                <p class="text-xl text-slate-500 mb-10 max-w-xl">專注於專業災難醫療、社區第一線反應員訓練，並與 AIT 等戰略夥伴緊密合作，將國際標準導入在地救護。</p>
            </div>
        </div>
        <div class="absolute right-0 top-0 w-1/3 h-full bg-slate-100 hidden lg:block skew-x-6 transform translate-x-20"></div>
    </header>

    <section id="projects" class="py-24 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-black text-primary mb-4">最新專案與訓練</h2>
            <p class="text-slate-400 mb-12">即時同步自台災工作日誌，紀錄每一場守護台灣的行動。</p>
            <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </div>
    </section>

    <!-- 預留 Footer 載入位置 -->
    <div id="footer-placeholder"></div>

    <!-- 放大視窗 (Modal) -->
    <div id="detailModal" class="modal flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-3xl overflow-hidden shadow-2xl relative flex flex-col">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-black z-10 bg-white/80 p-2 rounded-full backdrop-blur-sm">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
            <div id="modalContent" class="overflow-y-auto w-full h-full"></div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT_您的ID/pub?output=csv"; 
        let globalData = [];

        // 動態載入 Navbar 與 Footer
        async function loadComponents() {
            try {
                const navRes = await fetch('navbar.html');
                document.getElementById('navbar-placeholder').innerHTML = await navRes.text();
                
                const footerRes = await fetch('footer.html');
                document.getElementById('footer-placeholder').innerHTML = await footerRes.text();
            } catch (error) {
                console.error("組件載入失敗", error);
            }
        }

        async function init() {
            await loadComponents();

            if(SHEET_CSV_URL.includes("您的ID")) {
                renderCards(getMockData());
                return;
            }

            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    const validData = results.data.filter(row => row.Status === "TRUE" || row.Status === "TRUE\r");
                    renderCards(validData);
                }
            });
        }

        function renderCards(data) {
            globalData = data;
            const container = document.getElementById('card-container');
            container.innerHTML = ''; 

            data.forEach((item, index) => {
                const title = item.Title_zh || '無標題';
                const category = item.Category_zh || '一般分類';
                const summary = item.Summary_zh || '';
                const imgUrl = item.Image_URL || 'https://via.placeholder.com/600x400?text=No+Image';
                
                // 判斷是否有外部連結
                const hasExternalLink = item.Link_URL && item.Link_URL.trim() !== '' && item.Link_URL !== '#';
                
                // 根據連結狀態決定按鈕行為
                let actionButton = '';
                if (hasExternalLink) {
                    actionButton = `
                    <a href="${item.Link_URL}" target="_blank" class="flex items-center text-primary font-bold hover:text-orange-500 transition">
                        <span class="bg-slate-100 p-2 rounded-full mr-3"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
                        前往連結
                    </a>`;
                } else {
                    actionButton = `
                    <button onclick="openModal(${index})" class="flex items-center text-primary font-bold hover:text-orange-500 transition">
                        <span class="bg-slate-100 p-2 rounded-full mr-3"><i class="fa-solid fa-maximize"></i></span>
                        詳細內容
                    </button>`;
                }

                container.innerHTML += `
                <div class="card-hover bg-white rounded-3xl border border-gray-100 shadow-xl shadow-slate-200/50 overflow-hidden flex flex-col">
                    <div class="relative h-60 overflow-hidden bg-slate-100">
                        <img src="${imgUrl}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-primary/90 backdrop-blur-md text-white text-xs font-bold px-3 py-1 rounded-full">${category}</div>
                    </div>
                    <div class="p-8 flex-grow flex flex-col">
                        <h3 class="text-2xl font-bold text-primary mb-3">${title}</h3>
                        <p class="text-slate-500 leading-relaxed mb-6 flex-grow">${summary}</p>
                        <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                            ${actionButton}
                        </div>
                    </div>
                </div>`;
            });
        }

        function openModal(index) {
            const item = globalData[index];
            document.getElementById('modalContent').innerHTML = `
                <div class="w-full h-64 md:h-80 relative bg-slate-100">
                    <img src="${item.Image_URL}" class="w-full h-full object-cover">
                </div>
                <div class="p-8 md:p-12">
                    <h2 class="text-3xl font-black text-primary mb-6">${item.Title_zh}</h2>
                    <div class="text-slate-600 leading-loose whitespace-pre-line">${item.Description_zh || '尚無詳細描述。'}</div>
                </div>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('detailModal')) closeModal(); }

        function getMockData() {
            return [
                { Status: "TRUE", Title_zh: "北區醫療韌性推動基地", Category_zh: "援手計畫 3.0", Summary_zh: "有外部連結的卡片，點擊直接前往FB。", Image_URL: "https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&q=80&w=2070", Link_URL: "https://www.facebook.com/" },
                { Status: "TRUE", Title_zh: "第一線醫療人員災難照護訓練", Category_zh: "專業訓練", Summary_zh: "沒有外部連結的卡片，點擊會彈出帶有遮罩的詳細視窗。", Description_zh: "詳細內容在這裡顯示...", Image_URL: "https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?auto=format&fit=crop&q=80&w=2070", Link_URL: "" }
            ];
        }

        window.onload = init;
    </script>
</body>
</html>
