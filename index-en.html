<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWDMTDA | Taiwan Disaster Medical Development Association</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --primary: #1B365D; --accent: #FF7F32; }
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .text-primary { color: var(--primary); }
        .bg-primary { background-color: var(--primary); }
        .card-hover:hover { transform: translateY(-8px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-white">

    <div id="navbar-placeholder"></div>

    <header class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 bg-slate-900 overflow-hidden">
        <img src="https://scontent.ftpe7-4.fna.fbcdn.net/v/t39.30808-6/652619526_1254431233467440_2181217770649905261_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=13d280&_nc_ohc=STmfrgr7UREQ7kNvwErWLN1&_nc_oc=Adow9bFvgEmS7zOijPkLQulG_M4JdlisSF1812fnvdOHbo_3XUoGX6kxfz9XT_rgqD0&_nc_zt=23&_nc_ht=scontent.ftpe7-4.fna&_nc_gid=YwXFByuJL-y_NVGAdzywJw&_nc_ss=7a3a8&oh=00_Af1JOr558JBxz36SgYoQQfjTyqo8FnGn_b_crulrQppY5w&oe=69DCD4C1" 
             class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="max-w-7xl mx-auto px-6 relative z-10 text-white">
            <div class="lg:w-2/3">
                <span class="bg-orange-500 text-white px-4 py-1 rounded-full text-sm font-bold mb-6 inline-block">Take Action 3.0 Initiated</span>
                <h1 class="text-5xl lg:text-7xl font-black mb-6 leading-tight">Building <span class="text-orange-500">Resilience</span> for Taiwan</h1>
                <p class="text-xl text-slate-100 mb-10 max-w-xl">Focusing on professional disaster medicine and community first responder training in close partnership with AIT.</p>
            </div>
        </div>
    </header>

    <section id="projects" class="py-24 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-black text-primary mb-4">Latest Projects & Training</h2>
            <p class="text-slate-400 mb-12">Synchronized live updates of our actions across Taiwan.</p>
            <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <div id="detailModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-3xl overflow-hidden shadow-2xl relative flex flex-col">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-black z-10 bg-white/80 p-2 rounded-full backdrop-blur-sm">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
            <div id="modalContent" class="overflow-y-auto w-full h-full"></div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV1Hj2V0Xc1MMFSVime2_EmGN9_Gh30UGLt0eK29w-g8SJcurqDvhPrm0GXlrLfA4ChkqDVbzmmc6Q/pub?output=csv"; 
        let globalData = [];

        async function loadComponents() {
            try {
                const navRes = await fetch('navbar-en.html');
                document.getElementById('navbar-placeholder').innerHTML = await navRes.text();
                const footerRes = await fetch('footer-en.html');
                document.getElementById('footer-placeholder').innerHTML = await footerRes.text();
            } catch (error) { console.error("Component load failed", error); }
        }

        async function init() {
            await loadComponents();
            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    const validData = results.data.filter(row => {
                        if (!row.Status) return false;
                        return String(row.Status).trim().toUpperCase() === "TRUE";
                    });
                    renderCards(validData);
                }
            });
        }

        function renderCards(data) {
            globalData = data;
            const container = document.getElementById('card-container');
            container.innerHTML = ''; 
            data.forEach((item, index) => {
                const title = item.Title_en || item.Title_zh || 'Untitled';
                const summary = item.Summary_en || item.Summary_zh || '';
                const imgUrl = item.Image_URL || 'https://via.placeholder.com/600x400?text=No+Image';
                const hasExternalLink = item.Link_URL && item.Link_URL.trim() !== '' && item.Link_URL !== '#';
                
                let actionButton = hasExternalLink ? 
                    `<a href="${item.Link_URL}" target="_blank" class="flex items-center text-primary font-bold hover:text-orange-500 transition"><span class="bg-slate-100 p-2 rounded-full mr-3"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>External Link</a>` : 
                    `<button onclick="openModal(${index})" class="flex items-center text-primary font-bold hover:text-orange-500 transition"><span class="bg-slate-100 p-2 rounded-full mr-3"><i class="fa-solid fa-maximize"></i></span>Read More</button>`;

                container.innerHTML += `
                <div class="card-hover bg-white rounded-3xl border border-gray-100 shadow-xl shadow-slate-200/50 overflow-hidden flex flex-col">
                    <div class="relative h-60 overflow-hidden bg-slate-100">
                        <img src="${imgUrl}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-primary/90 backdrop-blur-md text-white text-xs font-bold px-3 py-1 rounded-full">${item.Category_en || 'Project'}</div>
                    </div>
                    <div class="p-8 flex-grow flex flex-col">
                        <h3 class="text-2xl font-bold text-primary mb-3">${title}</h3>
                        <p class="text-slate-500 leading-relaxed mb-6 flex-grow">${summary}</p>
                        <div class="flex justify-between items-center pt-6 border-t border-slate-50">${actionButton}</div>
                    </div>
                </div>`;
            });
        }

        function openModal(index) {
            const item = globalData[index];
            document.getElementById('modalContent').innerHTML = `
                <div class="w-full h-64 md:h-80 relative bg-slate-100"><img src="${item.Image_URL}" class="w-full h-full object-cover"></div>
                <div class="p-8 md:p-12"><h2 class="text-3xl font-black text-primary mb-6">${item.Title_en || item.Title_zh}</h2><div class="text-slate-600 leading-loose whitespace-pre-line">${item.Description_en || item.Description_zh || 'No description available.'}</div></div>`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        window.onclick = function(event) { if (event.target == document.getElementById('detailModal')) closeModal(); }
        window.onload = init;
    </script>
</body>
</html>
