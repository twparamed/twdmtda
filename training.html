<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業訓練 | 台災 TWDMTDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --primary: #1B365D; --accent: #FF7F32; }
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; scroll-behavior: smooth; }
        .text-primary { color: var(--primary); }
        .bg-primary { background-color: var(--primary); }
        .card-hover:hover { transform: translateY(-8px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-white">

    <div id="navbar-placeholder"></div>

    <header class="relative pt-32 pb-16 bg-slate-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 text-center relative z-10">
            <span class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-sm font-bold mb-4 inline-block">Training Records</span>
            <h1 class="text-4xl md:text-5xl font-black text-primary mb-4">專業訓練與教育推廣</h1>
            <p class="text-lg text-slate-500 max-w-2xl mx-auto">致力於提升台灣民間災難醫療與第一線反應員的應變能力。</p>
        </div>
    </header>

    <section class="py-16 bg-white min-h-screen">
        <div class="max-w-7xl mx-auto px-6">
            <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <div class="col-span-full py-20 text-center text-slate-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i>
                    <p>正在載入訓練紀錄...</p>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <div id="detailModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-3xl overflow-hidden shadow-2xl relative flex flex-col">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-black z-10 bg-white/80 p-2 rounded-full backdrop-blur-sm">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
            <div id="modalContent" class="overflow-y-auto w-full h-full"></div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV1Hj2V0Xc1MMFSVime2_EmGN9_Gh30UGLt0eK29w-g8SJcurqDvhPrm0GXlrLfA4ChkqDVbzmmc6Q/pub?output=csv"; 
        let globalData = [];

        async function loadComponents() {
            try {
                const navRes = await fetch('navbar.html'); document.getElementById('navbar-placeholder').innerHTML = await navRes.text();
                const footerRes = await fetch('footer.html'); document.getElementById('footer-placeholder').innerHTML = await footerRes.text();
            } catch (error) { console.error("組件載入失敗", error); }
        }

        async function init() {
            await loadComponents();
            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    // 分類邏輯：Status 必須為 TRUE，且 Category_zh 包含「訓練」或「教育」
                    const trainingData = results.data.filter(row => {
                        const statusStr = String(row.Status || "").trim().toUpperCase();
                        if (statusStr !== "TRUE") return false;
                        
                        const catStr = String(row.Category_zh || "").toLowerCase();
                        return catStr.includes("訓練") || catStr.includes("教育");
                    });

                    // 反轉陣列，讓最新填寫的資料顯示在最前面
                    renderCards(trainingData.reverse());
                }
            });
        }

        function renderCards(data) {
            globalData = data;
            const container = document.getElementById('card-container');
            container.innerHTML = ''; 
            
            if (data.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-slate-500 py-10">目前尚無相關訓練紀錄。</p>';
                return;
            }

            data.forEach((item, index) => {
                const title = item.Title_zh || '無標題';
                const summary = item.Summary_zh || '';
                const imgUrl = item.Image_URL || 'https://via.placeholder.com/600x400?text=No+Image';
                const category = item.Category_zh || '訓練';
                const hasExternalLink = item.Link_URL && item.Link_URL.trim() !== '' && item.Link_URL !== '#';
                
                let actionButton = hasExternalLink ? 
                    `<a href="${item.Link_URL}" target="_blank" class="flex items-center text-primary font-bold hover:text-orange-500 transition"><span class="bg-slate-100 p-2 rounded-full mr-3"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>前往連結</a>` : 
                    `<button onclick="openModal(${index})" class="flex items-center text-primary font-bold hover:text-orange-500 transition"><span class="bg-slate-100 p-2 rounded-full mr-3"><i class="fa-solid fa-maximize"></i></span>詳細內容</button>`;

                container.innerHTML += `
                <div class="card-hover bg-white rounded-3xl border border-gray-100 shadow-xl shadow-slate-200/50 overflow-hidden flex flex-col">
                    <div class="relative h-60 overflow-hidden bg-slate-100">
                        <img src="${imgUrl}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-primary/90 backdrop-blur-md text-white text-xs font-bold px-3 py-1 rounded-full">${category}</div>
                    </div>
                    <div class="p-8 flex-grow flex flex-col">
                        <h3 class="text-2xl font-bold text-primary mb-3">${title}</h3>
                        <p class="text-slate-500 leading-relaxed mb-6 flex-grow">${summary}</p>
                        <div class="flex justify-between items-center pt-6 border-t border-slate-50">${actionButton}</div>
                    </div>
                </div>`;
            });
        }

        function openModal(index) {
            const item = globalData[index];
            document.getElementById('modalContent').innerHTML = `
                <div class="w-full h-64 md:h-80 relative bg-slate-100"><img src="${item.Image_URL}" class="w-full h-full object-cover"></div>
                <div class="p-8 md:p-12"><h2 class="text-3xl font-black text-primary mb-6">${item.Title_zh}</h2><div class="text-slate-600 leading-loose whitespace-pre-line">${item.Description_zh || '尚無詳細描述。'}</div></div>`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        window.onclick = function(event) { if (event.target == document.getElementById('detailModal')) closeModal(); }
        window.onload = init;
    </script>
</body>
</html>
